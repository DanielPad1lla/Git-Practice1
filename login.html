<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Log In</title>
</head>
<body>
    <main class="contenedorLogin"> 
        <form class="form" method="POST" action="php/login.php"> 
            <h1 class="">Bienvenido a la Ferretería Don Toño</h1>
            <div class="inputblock"> 
                <label for="floatingInput">Email address</label> 
                <input type="email" class="inputs" id="floatingInput" placeholder="name@example.com" name="correo"> 
            </div> 
            <div class="inputblock">
                <label for="floatingPassword">Password</label> 
                <input type="password" class="form-control" id="floatingPassword" placeholder="Password"> 
            </div> 
            <div class="inputblock">
                <button class="btn btn-primary" type="submit">Sign in</button> 
                <p class="mt-5 mb-3 text-body-secondary">© 2017–2025</p> 
            </div>
        </form> 
    </main>
</body>
</html>
